name: Download, process and save DrugBank KG

on:
  workflow_dispatch:

jobs:
  download_and_extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download latest DrugBank release
        run: |
          download_url="https://go.drugbank.com/releases/5-1-12/downloads/all-full-database"
          curl -Lfv -o drugbank_data.zip -u "${{ secrets.DRUGBANK_USERNAME }}:${{ secrets.DRUGBANK_PASSWORD }}" "$download_url" 
        env:
          DRUGBANK_USERNAME: ${{ secrets.DRUGBANK_USERNAME }}
          DRUGBANK_PASSWORD: ${{ secrets.DRUGBANK_PASSWORD }}

      - name: Create data directory
        run: mkdir -p ./data

      - name: Extract DrugBank data
        run: |
          unzip -o drugbank_data.zip -d ./data/

      - name: Readable permissions for the extracted files
        run: |
          chmod -R 755 ./data/

      - name: Install dependencies
        run: |
          pip3 install rdflib agraph-python lxml 

      - name: Run the Python script
        env: 
           AGRAPH_HOST: ${{ secrets.HOST }}
           AGRAPH_PORT: ${{ secrets.PORT }}
           AGRAPH_USER: ${{ secrets.USER }}
           AGRAPH_PASSWORD: ${{ secrets.PASSWORD}}
        run: |
          python3 extract_and_create.py
